<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>WOODCUT OS | ENTERPRISE EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #FFB800; --bg: #050505; --card: #111111; --border: #222;
            --text: #E0E0E0; --success: #00FF85; --danger: #FF4B4B; --gold: #FFD700;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        /* FIX: Gebruik een robuuste flex-container voor de hele pagina */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--bg);
        }

        body { 
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif; 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            /* Gebruik dvh voor moderne browsers, vh als fallback */
            height: 100vh;
            height: 100dvh; 
            -webkit-font-smoothing: antialiased;
        }
        
        header { 
            flex-shrink: 0;
            padding: 20px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
            z-index: 1000;
        }
        
        .logo { font-weight: 800; letter-spacing: -1px; font-size: 1.2rem; }
        .logo span { color: var(--accent); }
        
        /* Het viewport gedeelte neemt nu alle rest-ruimte in */
        #viewport { 
            flex: 1 1 auto; 
            overflow-y: auto; 
            padding: 20px; 
            -webkit-overflow-scrolling: touch; 
        }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .kpi-card { background: var(--card); padding: 18px; border-radius: 16px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        .kpi-card::after { content:''; position:absolute; top:0; left:0; width:3px; height:100%; background: var(--accent); }
        .kpi-val { font-family: 'Inter', sans-serif; font-size: 1.4rem; font-weight: 700; display: block; margin-bottom: 4px; }
        .kpi-lbl { font-size: 0.65rem; text-transform: uppercase; color: #666; font-weight: 700; letter-spacing: 0.5px; }
        
        .plate-container { background: var(--card); border-radius: 20px; border: 1px solid var(--border); margin-bottom: 30px; overflow: hidden; }
        .plate-header { padding: 15px 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 600; }
        
        .scroll-area { width: 100%; overflow-x: auto; overflow-y: hidden; }
        .canvas-wrapper { transition: width 0.3s ease; width: 100%; position: relative; }
        .canvas-wrapper.zoomed { width: 200%; }
        canvas { width: 100%; height: auto; display: block; background: #000; cursor: pointer; }
        
        .zoom-bar { padding: 12px; background: #0a0a0a; border-top: 1px solid var(--border); display: flex; justify-content: center; }
        .btn-zoom { font-family: 'Plus Jakarta Sans'; background: #222; color: #fff; border: 1px solid #333; padding: 8px 20px; border-radius: 30px; font-size: 0.7rem; font-weight: 800; cursor: pointer; min-width: 120px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-zoom.active { background: var(--accent); color: #000; border-color: var(--accent); }
        
        /* FIX: De action-bar wordt nu hard onderaan de flex-box gehouden */
        .action-bar { 
            flex-shrink: 0;
            padding: 20px; 
            padding-bottom: calc(20px + env(safe-area-inset-bottom, 10px));
            background: #080808; 
            border-top: 1px solid var(--border); 
            display: flex; 
            gap: 12px; 
            z-index: 100;
        }
        
        .btn { font-family: 'Plus Jakarta Sans'; padding: 16px 24px; border-radius: 14px; border: none; font-weight: 800; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-primary { background: var(--accent); color: #000; flex: 2; }
        .btn-secondary { background: #1a1a1a; color: #fff; flex: 1; border: 1px solid #333; }
        
        #drawer { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100%; background: #0d0d0d; z-index: 2000; transition: 0.4s; padding: 30px; border-left: 1px solid var(--border); overflow-y: auto; }
        #drawer.open { right: 0; }
        #drawer h2 { font-weight: 800; letter-spacing: -0.5px; }
        
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; z-index: 1500; }
        .overlay.open { display: block; }
        
        .input-box { margin-bottom: 20px; }
        .input-box label { display: block; font-size: 0.7rem; color: var(--accent); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        
        input, select { width: 100%; background: #000; border: 1px solid var(--border); padding: 14px; border-radius: 12px; color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; }
        
        .piece-row { background: #151515; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: grid; grid-template-columns: 1fr 1fr 80px 40px; gap: 10px; align-items: end; }
        .project-item { background: #1a1a1a; padding: 12px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; position: relative; transition: 0.2s; }
        .project-item:hover { border-color: var(--accent); background: #222; }
        
        .delete-btn { color: #666; background: none; border: none; font-size: 1.2rem; padding: 5px 10px; cursor: pointer; transition: 0.2s; border-radius: 5px; }
        .delete-btn:hover { color: var(--danger); background: rgba(255,75,75,0.1); }
        .empty-state { text-align: center; padding: 100px 20px; color: #444; }
        .empty-state h2 { font-weight: 800; color: #666; }
        hr { border: 0; border-top: 1px solid #222; margin: 25px 0; }

        @media print {
            body { background: white !important; color: black !important; overflow: visible !important; height: auto !important; font-family: sans-serif; }
            header, .action-bar, .zoom-bar, #drawer, .overlay, .btn-zoom, .dashboard-grid, .empty-state { display: none !important; }
            #viewport { padding: 0 !important; overflow: visible !important; }
            .plate-container { border: 2px solid #000 !important; background: white !important; page-break-after: always; border-radius: 0 !important; margin-bottom: 50px !important; }
            .plate-header { background: #eee !important; color: black !important; border-bottom: 2px solid #000 !important; font-weight: 800; }
            canvas { filter: invert(1) contrast(1.2); border: 1px solid #000; width: 100% !important; height: auto !important; }
            .scroll-area, .canvas-wrapper { overflow: visible !important; width: 100% !important; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">WOODCUT<span>.OS</span></div>
    <div id="project-display" style="font-size: 10px; background: rgba(255,184,0,0.1); color: var(--accent); padding: 5px 12px; border-radius: 20px; font-weight: 800; letter-spacing: 1px;">NIEUW PROJECT</div>
</header>

<div id="viewport">
    <div class="dashboard-grid">
        <div class="kpi-card"><span class="kpi-val" id="kpi-cost">€ 0.00</span><span class="kpi-lbl">Project Waarde</span></div>
        <div class="kpi-card"><span class="kpi-val" id="kpi-plates">0</span><span class="kpi-lbl">Platen</span></div>
        <div class="kpi-card"><span class="kpi-val" id="kpi-progress">0/0</span><span class="kpi-lbl">Voortgang</span></div>
        <div class="kpi-card"><span class="kpi-val" id="kpi-eff">0%</span><span class="kpi-lbl">Rendement</span></div>
    </div>
    <div id="plates-render">
        <div class="empty-state"><h2>Start een project</h2><p>Open configuratie om materiaal en stukken in te voeren.</p></div>
    </div>
</div>

<div class="action-bar">
    <button class="btn btn-secondary" onclick="window.print()">Export PDF</button>
    <button class="btn btn-primary" onclick="toggleDrawer()">Configuratie</button>
</div>

<div class="overlay" id="overlay" onclick="toggleDrawer()"></div>
<div id="drawer">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin:0;">Beheer</h2>
        <button class="btn btn-secondary" style="padding: 8px 15px; font-size: 0.7rem; border-color: var(--accent);" onclick="startNewProject()">+ Nieuw Project</button>
    </div>
    
    <div class="input-box">
        <label>Project Naam</label>
        <input type="text" id="project-name" placeholder="bijv. Kast Werkplaats">
    </div>

    <div class="input-box">
        <label>Materiaal</label>
        <select id="mat-select" onchange="updateMaterial()">
            <optgroup label="MDF (Standaard 244x122)">
                <option value="mdf-18" data-w="2440" data-h="1220" data-p="42.50">MDF 18mm - €42,50</option>
                <option value="mdf-12" data-w="2440" data-h="1220" data-p="32.95">MDF 12mm - €32,95</option>
                <option value="mdf-9" data-w="2440" data-h="1220" data-p="26.50">MDF 9mm - €26,50</option>
                <option value="mdf-6" data-w="2440" data-h="1220" data-p="19.00">MDF 6mm - €19,00</option>
            </optgroup>
            <optgroup label="Multiplex (Berken 250x125)">
                <option value="birch-18" data-w="2500" data-h="1250" data-p="98.00">Berken 18mm - €98,00</option>
                <option value="birch-15" data-w="2500" data-h="1250" data-p="82.00">Berken 15mm - €82,00</option>
                <option value="birch-12" data-w="2500" data-h="1250" data-p="65.00">Berken 12mm - €65,00</option>
                <option value="birch-9" data-w="2500" data-h="1250" data-p="48.00">Berken 9mm - €48,00</option>
            </optgroup>
            <optgroup label="Multiplex (Populier 250x122)">
                <option value="pop-18" data-w="2500" data-h="1220" data-p="68.00">Populier 18mm - €68,00</option>
                <option value="pop-12" data-w="2500" data-h="1220" data-p="45.00">Populier 12mm - €45,00</option>
            </optgroup>
            <optgroup label="Betonplex (Antislip/Glad)">
                <option value="beton-18" data-w="2500" data-h="1250" data-p="89.00">Betonplex 18mm - €89,00</option>
                <option value="beton-12" data-w="2440" data-h="1220" data-p="58.00">Betonplex 12mm - €58,00</option>
            </optgroup>
            <optgroup label="Meubelpaneel / Spaanplaat">
                <option value="chip-18-white" data-w="2500" data-h="1250" data-p="38.00">Wit Meubelpaneel 18mm - €38,00</option>
                <option value="chip-18-raw" data-w="2440" data-h="1220" data-p="24.00">Spaanplaat Ruw 18mm - €24,00</option>
            </optgroup>
        </select>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
        <div class="input-box"><label>Plaat L (mm)</label><input type="number" id="p-sw" value="2440"></div>
        <div class="input-box"><label>Plaat B (mm)</label><input type="number" id="p-sh" value="1220"></div>
    </div>

    <div id="items-list"></div>
    <button class="btn btn-secondary" style="width:100%; margin:10px 0" onclick="addItem()">+ Stuk Toevoegen</button>
    <button class="btn btn-primary" style="width:100%" onclick="calculate()">Bereken & Opslaan</button>

    <hr>
    <div id="saved-projects"></div>
    <button class="btn btn-secondary" style="width:100%; margin-top:10px; border-color:var(--danger); color:var(--danger); font-size: 0.7rem;" onclick="clearAllProjects()">Wis Alle Data</button>
</div>

<script>
    let app = {
        currentId: null,
        config: { sw: 2440, sh: 1220, kerf: 3.2, platePrice: 42.50 },
        items: [], done: [], plates: [],
        zoomedPlates: [] 
    };

    function saveToStorage() {
        if (app.items.length === 0) return;
        let projects = JSON.parse(localStorage.getItem('woodcut_db') || '[]');
        const data = {
            id: app.currentId || Date.now(),
            name: document.getElementById('project-name').value || "Naamloos Project",
            config: {...app.config},
            items: [...app.items],
            done: [...app.done],
            date: new Date().toLocaleString('nl-NL', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'})
        };
        const idx = projects.findIndex(p => p.id === data.id);
        if(idx > -1) projects[idx] = data; else projects.push(data);
        app.currentId = data.id;
        localStorage.setItem('woodcut_db', JSON.stringify(projects));
        updateProjectList();
        document.getElementById('project-display').innerText = data.name.toUpperCase();
    }

    function deleteProject(id, event) {
        event.stopPropagation();
        if(!confirm("Project verwijderen?")) return;
        let projects = JSON.parse(localStorage.getItem('woodcut_db') || '[]');
        projects = projects.filter(p => p.id !== id);
        localStorage.setItem('woodcut_db', JSON.stringify(projects));
        if(app.currentId === id) {
            app.currentId = null; app.items = []; app.done = []; app.plates = [];
            document.getElementById('project-name').value = "";
            document.getElementById('project-display').innerText = "PROJECT VERWIJDERD";
            document.getElementById('plates-render').innerHTML = '<div class="empty-state"><h2>Project verwijderd</h2><p>Selecteer een ander project of start opnieuw.</p></div>';
            resetKPIs();
        }
        updateProjectList();
    }

    function resetKPIs() {
        document.getElementById('kpi-cost').innerText = "€ 0.00";
        document.getElementById('kpi-plates').innerText = "0";
        document.getElementById('kpi-progress').innerText = "0/0";
        document.getElementById('kpi-eff').innerText = "0%";
    }

    function startNewProject() {
        if (app.items.length > 0) saveToStorage();
        app.currentId = null; app.items = []; app.done = []; app.plates = []; app.zoomedPlates = [];
        document.getElementById('project-name').value = "";
        document.getElementById('project-display').innerText = "NIEUW PROJECT";
        document.getElementById('plates-render').innerHTML = '<div class="empty-state"><h2>Nieuw Project</h2><p>Voeg stukken toe.</p></div>';
        renderInputRows();
        resetKPIs();
    }

    function loadProject(id) {
        let projects = JSON.parse(localStorage.getItem('woodcut_db') || '[]');
        const p = projects.find(proj => proj.id === id);
        if(!p) return;
        app.currentId = p.id; app.config = p.config; app.items = p.items; app.done = p.done; app.zoomedPlates = [];
        document.getElementById('project-name').value = p.name;
        document.getElementById('p-sw').value = p.config.sw;
        document.getElementById('p-sh').value = p.config.sh;
        document.getElementById('project-display').innerText = p.name.toUpperCase();
        calculate(false);
        toggleDrawer();
    }

    function updateProjectList() {
        const container = document.getElementById('saved-projects');
        let projects = JSON.parse(localStorage.getItem('woodcut_db') || '[]');
        container.innerHTML = projects.length ? '<h3 style="font-size:0.8rem; color:#666; text-transform:uppercase; letter-spacing:1px; margin-bottom:15px;">Projecten Historie</h3>' : '';
        projects.slice().reverse().forEach(p => {
            const div = document.createElement('div');
            div.className = 'project-item';
            div.onclick = () => loadProject(p.id);
            div.innerHTML = `
                <div style="flex:1">
                    <div style="font-weight:800; font-size:0.8rem">${p.name}</div>
                    <div style="font-size:0.6rem; color:#666; font-family:'Inter'">${p.date}</div>
                </div>
                <button class="delete-btn" onclick="deleteProject(${p.id}, event)">✕</button>
                <div style="color:var(--accent); margin-left:10px">→</div>
            `;
            container.appendChild(div);
        });
    }

    function updateMaterial() {
        const opt = document.getElementById('mat-select').selectedOptions[0];
        app.config.sw = parseInt(opt.dataset.w);
        app.config.sh = parseInt(opt.dataset.h);
        app.config.platePrice = parseFloat(opt.dataset.p);
        document.getElementById('p-sw').value = app.config.sw;
        document.getElementById('p-sh').value = app.config.sh;
    }

    function toggleDrawer() {
        document.getElementById('drawer').classList.toggle('open');
        document.getElementById('overlay').classList.toggle('open');
        renderInputRows();
        updateProjectList();
    }

    function addItem() {
        app.items.push({w: 600, h: 400, qty: 1});
        renderInputRows();
    }

    function renderInputRows() {
        const c = document.getElementById('items-list');
        c.innerHTML = '';
        app.items.forEach((it, i) => {
            c.innerHTML += `<div class="piece-row">
                <div><label>L</label><input type="number" value="${it.w}" onchange="app.items[${i}].w=parseInt(this.value)"></div>
                <div><label>B</label><input type="number" value="${it.h}" onchange="app.items[${i}].h=parseInt(this.value)"></div>
                <div><label>#</label><input type="number" value="${it.qty}" onchange="app.items[${i}].qty=parseInt(this.value)"></div>
                <button onclick="app.items.splice(${i},1);renderInputRows()" style="color:var(--danger); background:none; border:none; cursor:pointer; font-size:1.2rem;">✕</button>
            </div>`;
        });
    }

    function calculate(shouldSave = true) {
        if(app.items.length === 0) return;
        app.config.sw = parseInt(document.getElementById('p-sw').value);
        app.config.sh = parseInt(document.getElementById('p-sh').value);
        
        let pool = [];
        app.items.forEach((it, idx) => {
            for(let q=0; q<it.qty; q++) {
                pool.push({w: it.w, h: it.h, id: `p-${idx}-${q}`});
            }
        });
        
        pool.sort((a,b) => (b.w * b.h) - (a.w * a.h));

        let plates = [];
        while(pool.length > 0) {
            let p = { w: app.config.sw, h: app.config.sh, parts: [], free: [{x:0, y:0, w:app.config.sw, h:app.config.sh}] };
            let addedAnything = false;
            for(let i=0; i<pool.length; i++) {
                let itm = pool[i]; let fit = null;
                for(let j=0; j<p.free.length; j++) {
                    let f = p.free[j];
                    if(itm.w <= f.w && itm.h <= f.h) fit = {j, w: itm.w, h: itm.h};
                    else if(itm.h <= f.w && itm.w <= f.h) fit = {j, w: itm.h, h: itm.w};
                    if(fit) {
                        let fs = p.free[fit.j];
                        p.parts.push({ x:fs.x, y:fs.y, fw:fit.w, fh:fit.h, id: itm.id });
                        p.free.splice(fit.j,1);
                        // Bereken nieuwe vrije ruimtes met zaagsnede verlies
                        let rw = fs.w-fit.w, rh = fs.h-fit.h;
                        if(rw > rh) {
                            if(rw > app.config.kerf) p.free.unshift({x:fs.x+fit.w+app.config.kerf, y:fs.y, w:rw-app.config.kerf, h:fs.h});
                            if(rh > app.config.kerf) p.free.unshift({x:fs.x, y:fs.y+fit.h+app.config.kerf, w:fit.w, h:rh-app.config.kerf});
                        } else {
                            if(rh > app.config.kerf) p.free.unshift({x:fs.x, y:fs.y+fit.h+app.config.kerf, w:fs.w, h:rh-app.config.kerf});
                            if(rw > app.config.kerf) p.free.unshift({x:fs.x+fit.w+app.config.kerf, y:fs.y, w:rw-app.config.kerf, h:fit.h});
                        }
                        pool.splice(i,1); i--; addedAnything = true; break;
                    }
                }
            }
            plates.push(p);
            if(!addedAnything) break;
        }
        app.plates = plates;
        render();
        if(shouldSave) { saveToStorage(); toggleDrawer(); }
    }

    function toggleZoom(idx) {
        if(app.zoomedPlates.includes(idx)) {
            app.zoomedPlates = app.zoomedPlates.filter(i => i !== idx);
        } else {
            app.zoomedPlates.push(idx);
        }
        render();
    }

    function render() {
        const container = document.getElementById('plates-render');
        container.innerHTML = '';
        if(app.plates.length === 0) return;

        let usedArea = 0;
        app.plates.forEach(p => p.parts.forEach(pt => usedArea += (pt.fw * pt.fh)));

        document.getElementById('kpi-cost').innerText = `€ ${(app.plates.length * app.config.platePrice).toFixed(2)}`;
        document.getElementById('kpi-plates').innerText = app.plates.length;
        document.getElementById('kpi-progress').innerText = `${app.done.length}/${app.items.reduce((a,b)=>a+b.qty,0)}`;
        document.getElementById('kpi-eff').innerText = `${((usedArea/(app.plates.length * app.config.sw * app.config.sh))*100).toFixed(1)}%`;

        app.plates.forEach((p, idx) => {
            const isZoomed = app.zoomedPlates.includes(idx);
            const wrap = document.createElement('div');
            wrap.className = 'plate-container';
            wrap.innerHTML = `<div class="plate-header"><span>VOLLE PLAAT #${idx+1}</span><span>${p.w}x${p.h}mm</span></div>
                <div class="scroll-area"><div class="canvas-wrapper ${isZoomed ? 'zoomed' : ''}"><canvas id="c-${idx}"></canvas></div></div>
                <div class="zoom-bar"><button class="btn-zoom ${isZoomed ? 'active' : ''}" onclick="toggleZoom(${idx})">${isZoomed ? 'RESET' : 'ZOOM 200%'}</button></div>`;
            container.appendChild(wrap);
            
            const canvas = wrap.querySelector('canvas');
            canvas.width = p.w; canvas.height = p.h;
            const ctx = canvas.getContext('2d');
            
            // Achtergrond van de hele plaat
            ctx.fillStyle = "#111"; ctx.fillRect(0,0,p.w,p.h);

            // Teken reststukken (gearcierd)
            p.free.forEach(f => {
                if(f.w < 5 || f.h < 5) return;
                ctx.save();
                ctx.beginPath(); ctx.rect(f.x, f.y, f.w, f.h); ctx.clip();
                ctx.strokeStyle = "rgba(255, 215, 0, 0.25)"; ctx.lineWidth = 3;
                for (let i = -p.h; i < p.w + p.h; i += 35) {
                    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + p.h, p.h); ctx.stroke();
                }
                ctx.restore();
                if(f.w > 80 && f.h > 40) {
                    ctx.fillStyle = "rgba(255, 215, 0, 0.6)"; 
                    ctx.font = `bold ${Math.min(f.w/8, 30)}px 'JetBrains Mono'`;
                    ctx.textAlign = "center"; ctx.fillText(`${Math.round(f.w)}x${Math.round(f.h)}`, f.x + f.w/2, f.y + f.h/2);
                }
            });

            // Teken de gezaagde stukken
            p.parts.forEach(pt => {
                const isDone = app.done.includes(pt.id);
                ctx.fillStyle = isDone ? "#00FF85" : "#C19A6B";
                ctx.fillRect(pt.x, pt.y, pt.fw, pt.fh);
                ctx.strokeStyle = "#000"; ctx.lineWidth = 4; ctx.strokeRect(pt.x, pt.y, pt.fw, pt.fh);
                
                // Maten in het midden van het stuk
                let fontSize = Math.min(pt.fw / 6, pt.fh / 3, 50); 
                if (fontSize > 10) {
                    ctx.fillStyle = isDone ? "#000" : "#fff";
                    ctx.font = `bold ${fontSize}px 'JetBrains Mono'`; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                    ctx.fillText(`${pt.fw}x${pt.fh}`, pt.x + pt.fw/2, pt.y + pt.fh/2);
                }
            });

            canvas.onclick = (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (p.w / rect.width);
                const y = (e.clientY - rect.top) * (p.h / rect.height);
                p.parts.forEach(pt => {
                    if(x >= pt.x && x <= pt.x+pt.fw && y >= pt.y && y <= pt.y+pt.fh) {
                        app.done.includes(pt.id) ? app.done = app.done.filter(i=>i!==pt.id) : app.done.push(pt.id);
                        saveToStorage(); render();
                    }
                });
            };
        });
    }

    function clearAllProjects() {
        if(confirm("Echt alles wissen? Dit kan niet ongedaan worden gemaakt.")) { localStorage.removeItem('woodcut_db'); location.reload(); }
    }

    updateProjectList();
</script>
</body>
</html>
